<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alibaba Clone</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        .nav {
            background-color: #444;
            padding: 10px;
            text-align: center;
        }
        .nav a {
            color: #fff;
            text-decoration: none;
            margin: 10px;
        }
        .content {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .product {
            margin: 20px;
            width: 200px;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .product img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px 10px 0 0;
        }
        .product h2 {
            font-size: 18px;
            margin-top: 10px;
        }
        .product p {
            font-size: 14px;
            color: #666;
        }
        .footer {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
            clear: both;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>Alibaba Clone</h1>
    </header>
    <nav class="nav">
        <a href="#">Inicio</a>
        <a href="#">Categorías</a>
        <a href="#">Ofertas</a>
    </nav>
    <div class="content">
        <div class="product">
            <img src="https://via.placeholder.com/200x150" alt="Producto 1">
            <h2>Producto 1</h2>
            <p>Descripción del producto 1</p>
            <button>Comprar</button>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/200x150" alt="Producto 2">
            <h2>Producto 2</h2>
            <p>Descripción del producto 2</p>
            <button>Comprar</button>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/200x150" alt="Producto 3">
            <h2>Producto 3</h2>
            <p>Descripción del producto 3</p>
            <button>Comprar</button>
        </div>
    </div>
    <footer class="footer">
        <p>&copy; 2023 Alibaba Clone</p>
    </footer>
    <script>
        // Agregar funcionalidad para el botón de comprar
        const comprarButtons = document.querySelectorAll('.product button');
        comprarButtons.forEach(button => {
            button.addEventListener('click', () => {
                alert('Producto agregado al carrito');
            });
        });
    </script>
</body>
</html>
