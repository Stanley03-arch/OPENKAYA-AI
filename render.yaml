services:
  - type: web
    name: kaya-agent
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: "3001"
      - key: GROQ_KEYS
        sync: false
      - key: OPENROUTER_KEYS
        sync: false
      - key: GEMINI_KEYS
        sync: false
      - key: SERPER_KEYS
        sync: false
      - key: ILOVEPDF_KEYS
        sync: false
      - key: SARVAM_AI_API_KEY
        sync: false
